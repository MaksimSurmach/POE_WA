name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Publish release and images
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Resolve version
        id: release
        run: |
          case "$GITHUB_REF_NAME" in
            v[0-9]*.[0-9]*.[0-9]*) ;;
            *) echo "Invalid release tag: $GITHUB_REF_NAME" >&2; exit 1 ;;
          esac
          echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          password: ${{ env.DOCKER_PASSWORD }}
          username: ${{ env.DOCKER_USERNAME }}

      - name: Publish server image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.DOCKER_USERNAME }}/poe-worksmith:${{ steps.release.outputs.version }}
          target: server

      - name: Publish web image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.DOCKER_USERNAME }}/poe-worksmith:${{ steps.release.outputs.version }}-web
          target: web

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          args=(--generate-notes --title "$VERSION" --verify-tag)
          case "$VERSION" in *-*) args+=(--prerelease) ;; esac
          gh release create "$GITHUB_REF_NAME" "${args[@]}"
