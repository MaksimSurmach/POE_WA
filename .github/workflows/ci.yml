name: CI

on:
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      APP_ENV: test
      TEST_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/poe_worksmith_test
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: poe_worksmith_test
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d poe_worksmith_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.8.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm test:contracts
      - run: pnpm db:check:migrations
      - run: pnpm db:migrate
      - run: pnpm test:integration
      - run: pnpm test:e2e:backend
      - run: pnpm build
      - name: Validate and preview recipe catalog
        run: |
          echo '## Recipe catalog' >> "$GITHUB_STEP_SUMMARY"
          pnpm --filter @poe-worksmith/server recipes:validate 2>&1 | tee -a "$GITHUB_STEP_SUMMARY"
          pnpm --filter @poe-worksmith/server recipes:sync --dry-run 2>&1 | tee -a "$GITHUB_STEP_SUMMARY"
      - run: docker build --target server --tag poe-worksmith:test .
      - run: docker build --target web --tag poe-worksmith-web:test .
